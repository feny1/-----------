name: 'publish'

on:
  push:
    tags:
      - 'v*' # Triggers the build whenever you push a version tag like v1.0.0

jobs:
  build-tauri:
    permissions:
      contents: write # Required for creating releases and uploading assets
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, ubuntu-latest] # Generates Windows exe and Linux deb/appimage

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install project dependencies
        run: npm ci

      - name: build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # Automatically replaced by version tag
          releaseName: 'أجرة v__VERSION__'
          releaseBody: 'نسخة تشغيل تطبيق أجرة للسيارات.'
          releaseDraft: true
          prerelease: false
